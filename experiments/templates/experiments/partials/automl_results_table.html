<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead class="border-b border-slate-700 text-slate-400">
      <tr>
        <th class="text-right py-2">الترتيب</th>
        <th class="text-right py-2">الخوارزمية</th>
        <th class="text-right py-2">{{ score_label }}</th>
        <th class="text-right py-2">الحالة</th>
      </tr>
    </thead>
    <tbody>
      {% for row in automl_results %}
      <tr class="border-b border-slate-800">
        <td class="py-2">{{ forloop.counter }}</td>
        <td class="py-2 text-slate-200">{{ row.label }}</td>
        <td class="py-2 text-violet-300">{{ row.score|floatformat:4 }}</td>
        <td class="py-2">
          {% if forloop.first %}
            <span class="px-2 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-300">الأفضل</span>
          {% else %}
            <span class="px-2 py-1 rounded-full text-xs bg-slate-800 text-slate-400">بديل</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
